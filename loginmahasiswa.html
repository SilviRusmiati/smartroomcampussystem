<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Mahasiswa - Smarts Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       CSS VARIABLES UNTUK WARNA & UKURAN
       ========================================= */
    :root {
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #2a3e59; 
      --logo-size: 55px; 
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif; 
    }

    body {
      background: #e9e6e2;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================
       NAVBAR - TETAP SAMA SEPERTI HALAMAN UTAMA
       ========================================= */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 60px;
      background: #e9e6e2;
      border-bottom: 4px solid var(--accent);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon img {
      width: var(--logo-size);
      height: auto;
      max-height: 80px;
      object-fit: contain;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-text .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .brand-text .subtitle {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.3;
      margin-top: 2px;
    }

    .nav-right {
      display: flex;
      align-items: center;
    }

    .nav-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
      padding: 8px 20px;
      border-radius: 50px;
      letter-spacing: 0.5px;
    }

    /* =========================================
       LOGIN SECTION - BACKGROUND & LAYOUT
       ========================================= */
    .login-section {
      min-height: calc(100vh - 80px); /* Memenuhi sisa layar di bawah navbar */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;

      background: url("bg.biru.jpeg"); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* =========================================
       GLASSMORPHISM CARD (KOTAK LOGIN)
       ========================================= */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.15); /* Putih transparan */
      backdrop-filter: blur(15px); /* Efek kaca (blur background) */
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
      animation: fadeInUp 0.8s ease-out;
    }

    /* =========================================
       FORM ELEMENTS
       ========================================= */
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.2); /* Input transparan */
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.3);
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .forgot-password {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 25px;
    }

    .forgot-password a {
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      background: #333333; /* Warna gelap solid agar menonjol */
      color: #ffffff;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #000000;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .register-link a {
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* =========================================
       ANIMASI AWAL
       ========================================= */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
       RESPONSIVE (UNTUK TAMPILAN HP)
       ========================================= */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        padding: 20px;
        gap: 15px;
        text-align: center;
      }
      .brand {
        flex-direction: column;
        gap: 10px;
      }
      .login-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="brand">
      <div class="logo-icon">
        <img src="logo.png" alt="Logo SCS">
      </div>
      <div class="brand-text">
        <div class="title">Smarts Room</div>
        <div class="subtitle">Campus System</div>
      </div>
    </div>
    
    <div class="nav-right">
      <span class="nav-text">Selamat Datang di Website Kami!</span>
    </div>
  </header>

  <section class="login-section">
    <div class="login-card">
      <form action="#" method="POST">

        <div class="input-group">
          <label for="nama">Username</label>
          <input type="text" id="nama" placeholder="Antoni">
        </div>

        <div class="input-group">
          <label for="nim">NIM</label>
          <input type="text" id="nim" placeholder="1234">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="•••••">
        </div>

        <div class="forgot-password">
          <a href="#">Lupa Password</a>
        </div>

        <button type="submit" class="btn-login">Login</button>

        <div class="register-link">
          Belum punya akun? <a href="#">Registrasi Sekarang</a>
        </div>

      </form>
    </div>
  </section>

</body>
</html>
