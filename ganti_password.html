<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ganti Kata Sandi - SRCS</title>
</head>
<body>
    <main>
        <h2>Ganti Kata Sandi</h2>
        <form action="dashboard.html" method="POST">
            <div>
                <label for="password_lama">Kata Sandi Lama:</label><br>
                <input type="password" id="password_lama" name="password_lama" required>
            </div>
            <br>
            <div>
                <label for="password_baru">Kata Sandi Baru:</label><br>
                <input type="password" id="password_baru" name="password_baru" required>
            </div>
            <br>
            <div>
                <label for="konfirmasi_password">Konfirmasi Kata Sandi Baru:</label><br>
                <input type="password" id="konfirmasi_password" name="konfirmasi_password" required>
            </div>
            <br>
            <button type="submit">Simpan Kata Sandi</button>
        </form>
    </main>
</body>
</html>
