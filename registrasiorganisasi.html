<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrasi Organisasi - Smarts Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --text-main: #1e293b; --accent: #2a3e59; --logo-size: 55px; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #e9e6e2; -webkit-font-smoothing: antialiased; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 60px; background: #e9e6e2;
      border-bottom: 4px solid var(--accent);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo-placeholder {
      width: var(--logo-size); height: var(--logo-size); background: var(--accent);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700;
    }
    .brand-text .title {
      font-family: 'Playfair Display', serif; font-size: 1.6rem;
      font-weight: 700; color: var(--accent); letter-spacing: 0.5px; line-height: 1.1;
    }
    .brand-text .subtitle {
      font-size: 0.85rem; font-weight: 700; color: var(--text-main);
      text-transform: uppercase; letter-spacing: 2px; margin-top: 2px;
    }
    .nav-text {
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
      background: rgba(59,130,246,0.1); padding: 8px 20px; border-radius: 50px;
    }

    .register-section {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;

      /* Background gradient menyerupai foto: biru-abu lembut */
      background: url("bg.biru.jpeg"); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .register-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px; padding: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      animation: fadeInUp 0.8s ease-out;
    }

    .form-title { text-align: center; margin-bottom: 32px; }
    .form-title h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #fff; }
    .form-title p { font-size: 0.82rem; color: rgba(255,255,255,0.75); margin-top: 6px; }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .input-group input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff; font-size: 0.95rem;
      font-family: 'Plus Jakarta Sans', sans-serif; outline: none; transition: all 0.3s;
    }
    .input-group input::placeholder { color: rgba(255,255,255,0.55); font-weight: 500; }
    .input-group input:focus {
      background: rgba(255,255,255,0.3); border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-password {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 1rem;
    }
    .toggle-password:hover { color: #fff; }

    .terms-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px; margin-top: 4px; }
    .terms-group input[type="checkbox"] { width: 17px; height: 17px; min-width: 17px; margin-top: 2px; accent-color: #fff; }
    .terms-group label { font-size: 0.8rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
    .terms-group label a { color: #fff; font-weight: 700; text-decoration: none; }
    .terms-group label a:hover { text-decoration: underline; }

    .btn-register {
      width: 100%; background: #333; color: #fff; padding: 14px; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-register:hover { background: #000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    .login-link { text-align: center; margin-top: 18px; font-size: 0.85rem; color: rgba(255,255,255,0.8); }
    .login-link a { color: #fff; font-weight: 700; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .navbar { flex-direction: column; padding: 20px; gap: 15px; text-align: center; }
      .brand { flex-direction: column; gap: 10px; }
      .register-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
     <img src="Logo .png" alt="Smarts Room" style="height:36px">
    <div>
        <div class="brand-name">Smarts Romm</div>
        <div class="brand-sub">Campus System</div>
    </div>
    <div class="nav-right">
      <span class="nav-text">Selamat Datang di Website Kami!</span>
    </div>
  </header>

  <section class="register-section">
    <div class="register-card">

      <div class="form-title">
        <h2>Registrasi Organisasi</h2>
        <p>Daftarkan organisasi Anda ke Smarts Room</p>
      </div>

      <form action="#" method="POST">

        <div class="input-group">
          <label for="nama_organisasi">Nama Organisasi</label>
          <input type="text" id="nama_organisasi" name="nama_organisasi" placeholder="Contoh: BEM Fakultas Teknik" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Min. 8 karakter" required>
            <button type="button" class="toggle-password" onclick="togglePass('password', this)">👁</button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm_password">Konfirmasi Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Ulangi password" required>
            <button type="button" class="toggle-password" onclick="togglePass('confirm_password', this)">👁</button>
          </div>
        </div>

        <div class="terms-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">Saya menyetujui <a href="#">Syarat & Ketentuan</a> serta <a href="#">Kebijakan Privasi</a> Smarts Room Campus System.</label>
        </div>

        <button type="submit" class="btn-register">Daftar Sekarang</button>

         <div class="login-link">
          Sudah punya akun? <a href="loginorganisasi.html">Login di sini</a>
        </div>

      </form>
    </div>
  </section>

  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    document.querySelector('form').addEventListener('submit', function(e) {
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        e.preventDefault();
        alert('Password dan Konfirmasi Password tidak cocok!');
        document.getElementById('confirm_password').focus();
      }
    });
  </script>

</body>
</html>
