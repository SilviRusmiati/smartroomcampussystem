<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrasi Sapras - Smarts Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --text-main: #1e293b; --accent: #2a3e59; --logo-size: 55px; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #e9e6e2; -webkit-font-smoothing: antialiased; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 60px; background: #e9e6e2;
      border-bottom: 4px solid var(--accent);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo-icon img { width: var(--logo-size); height: auto; object-fit: contain; }
    .brand-text .title {
      font-family: 'Playfair Display', serif; font-size: 1.6rem;
      font-weight: 700; color: var(--accent); letter-spacing: 0.5px; line-height: 1.1;
    }
    .brand-text .subtitle {
      font-size: 0.85rem; font-weight: 700; color: var(--text-main);
      text-transform: uppercase; letter-spacing: 2px; margin-top: 2px;
    }
    .nav-text {
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
      background: rgba(59,130,246,0.1); padding: 8px 20px; border-radius: 50px;
    }

   .register-section {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;

      /* Background gradient menyerupai foto: biru-abu lembut */
      background: url("bg.biru.jpeg"); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .register-card {
      width: 100%; max-width: 460px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px; padding: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      animation: fadeInUp 0.8s ease-out;
    }

    .form-title { text-align: center; margin-bottom: 28px; }
    .form-title h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #fff; }
    .form-title p { font-size: 0.82rem; color: rgba(255,255,255,0.75); margin-top: 6px; }

    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 0.82rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .input-group input, .input-group select, .input-group textarea {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff; font-size: 0.92rem;
      font-family: 'Plus Jakarta Sans', sans-serif; outline: none; transition: all 0.3s;
      appearance: none; -webkit-appearance: none;
    }
    .input-group textarea { resize: vertical; min-height: 85px; }
    .input-group input::placeholder, .input-group textarea::placeholder { color: rgba(255,255,255,0.55); }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      background: rgba(255,255,255,0.3); border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
    .input-group select option { background: #2a3e59; color: #fff; }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: rgba(255,255,255,0.7); pointer-events: none;
    }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-password {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 1rem;
    }
    .toggle-password:hover { color: #fff; }

    hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 8px 0 20px; }
    .section-label {
      font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.6);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px;
    }

    .terms-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 22px; }
    .terms-group input[type="checkbox"] { width: 17px; height: 17px; min-width: 17px; margin-top: 2px; accent-color: #fff; }
    .terms-group label { font-size: 0.8rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
    .terms-group label a { color: #fff; font-weight: 700; text-decoration: none; }
    .terms-group label a:hover { text-decoration: underline; }

    .btn-register {
      width: 100%; background: #333; color: #fff; padding: 14px; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-register:hover { background: #000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    .login-link { text-align: center; margin-top: 18px; font-size: 0.85rem; color: rgba(255,255,255,0.8); }
    .login-link a { color: #fff; font-weight: 700; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .navbar { flex-direction: column; padding: 20px; gap: 15px; text-align: center; }
      .brand { flex-direction: column; gap: 10px; }
      .register-card { padding: 30px 20px; }
      .input-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="brand">
      <div class="logo-icon"><img src="Logo.png" alt="Logo"></div>
      <div class="brand-text">
        <div class="title">Smarts Room</div>
        <div class="subtitle">Campus System</div>
      </div>
    </div>
    <div class="nav-right">
      <span class="nav-text">Selamat Datang di Website Kami!</span>
    </div>
  </header>

  <section class="register-section">
    <div class="register-card">

      <div class="form-title">
        <h2>Registrasi Sapras</h2>
        <p>Daftarkan akun Sarana & Prasarana kampus</p>
      </div>

      <form action="#" method="POST">

        <div class="section-label">Identitas Petugas</div>

        <div class="input-row">
          <div class="input-group">
            <label for="nip">NIP / ID Pegawai</label>
            <input type="text" id="nip" name="nip" placeholder="Contoh: 19800101" required>
          </div>
          <div class="input-group">
            <label for="no_hp">No. Handphone</label>
            <input type="tel" id="no_hp" name="no_hp" placeholder="08xxxxxxxxxx" required>
          </div>
        </div>

        <div class="input-group">
          <label for="nama">Nama Lengkap Petugas</label>
          <input type="text" id="nama" name="nama" placeholder="Nama lengkap" required>
        </div>

        <div class="input-group">
          <label for="email">Email Aktif</label>
          <input type="email" id="email" name="email" placeholder="nama@email.com" required>
        </div>

        <hr class="divider">
        <div class="section-label">Data Unit Sapras</div>

        <div class="input-group">
          <label for="unit">Nama Unit / Bagian</label>
          <input type="text" id="unit" name="unit" placeholder="Contoh: Unit Gedung A" required>
        </div>

        <div class="input-group">
          <label for="jenis">Jenis Sapras</label>
          <div class="select-wrapper">
            <select id="jenis" name="jenis" required>
              <option value="" disabled selected>Pilih Jenis</option>
              <option value="ruang_kelas">Ruang Kelas</option>
              <option value="laboratorium">Laboratorium</option>
              <option value="aula">Aula / Gedung Pertemuan</option>
              <option value="lapangan">Lapangan / Area Olahraga</option>
              <option value="perpustakaan">Perpustakaan</option>
              <option value="kantin">Kantin</option>
              <option value="lainnya">Lainnya</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label for="lokasi">Lokasi / Gedung</label>
          <input type="text" id="lokasi" name="lokasi" placeholder="Contoh: Gedung B Lantai 2" required>
        </div>

        <div class="input-group">
          <label for="kapasitas">Kapasitas (Orang)</label>
          <input type="number" id="kapasitas" name="kapasitas" placeholder="Contoh: 40" min="1" required>
        </div>

        <div class="input-group">
          <label for="keterangan">Keterangan Tambahan</label>
          <textarea id="keterangan" name="keterangan" placeholder="Fasilitas tersedia, kondisi ruangan, dll."></textarea>
        </div>

        <hr class="divider">
        <div class="section-label">Keamanan Akun</div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Min. 8 karakter" required>
            <button type="button" class="toggle-password" onclick="togglePass('password', this)">👁</button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm_password">Konfirmasi Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Ulangi password" required>
            <button type="button" class="toggle-password" onclick="togglePass('confirm_password', this)">👁</button>
          </div>
        </div>

        <div class="terms-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">Saya menyetujui <a href="#">Syarat & Ketentuan</a> serta <a href="#">Kebijakan Privasi</a> Smarts Room Campus System.</label>
        </div>

        <button type="submit" class="btn-register">Daftar Sekarang</button>

        <div class="login-link">
          Sudah punya akun? <a href="LoginSapras.html">Login di sini</a>
        </div>

      </form>
    </div>
  </section>

  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    document.querySelector('form').addEventListener('submit', function(e) {
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        e.preventDefault();
        alert('Password dan Konfirmasi Password tidak cocok!');
        document.getElementById('confirm_password').focus();
      }
    });
  </script>

</body>
</html>
