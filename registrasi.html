<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Akun - SRCS</title>
</head>
<body>
    <main>
        <h2>Pendaftaran Akun Baru</h2>
        <form action="login.html" method="POST">
            <div>
                <label for="nim_nidn">NIM / NIDN:</label><br>
                <input type="text" id="nim_nidn" name="nim_nidn" required>
            </div>
            <br>
            <div>
                <label for="nama_lengkap">Nama Lengkap:</label><br>
                <input type="text" id="nama_lengkap" name="nama_lengkap" required>
            </div>
            <br>
            <div>
                <label for="role">Peran:</label><br>
                <select id="role" name="role" required>
                    <option value="mahasiswa">Mahasiswa</option>
                    <option value="dosen">Dosen</option>
                    <option value="organisasi">Perwakilan Organisasi</option>
                </select>
            </div>
            <br>
            <div>
                <label for="password">Kata Sandi Baru:</label><br>
                <input type="password" id="password" name="password" required>
            </div>
            <br>
            <button type="submit">Daftar</button>
            <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
        </form>
    </main>
</body>
</html>
