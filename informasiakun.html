<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informasi Akun</title>

<style>
:root{
    --font:'Segoe UI',sans-serif;
    --text-dark:#1e2a45;
    --text-mid:#3d4f6e;
    --badge-bg:rgba(255,255,255,0.45);
    --badge-text:#2c3e6b;
    --divider:rgba(100,120,160,0.2);
}

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body */
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
    background:url(bg.biru.jpeg);
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:120px;
}

/* ================= HEADER ================= */

.top-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:65px;
    background:#f0ece3;
    border-bottom:3px solid #34507a;
    display:flex;
    align-items:center;
    padding:14px 28px;
    z-index:10;
}

.logo-container{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo{
    width:70px;
    height:70px;
    object-fit:contain;
}

.logo-text h1{
    font-size:18px;
    font-weight:700;
    color:#1e3356;
    line-height:1.2;
}

.logo-text p{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.12em;
    color:#4a6080;
    text-transform:uppercase;
}

/* ================= CARD ================= */

.card{
    width:100%;
    max-width:680px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:25px;
    padding:40px;
    box-shadow:0 8px 32px rgba(0,0,0,0.1);
}

.card-header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.header-icon{
    color:var(--text-dark);
}

.card-title{
    font-size:22px;
    font-weight:800;
    color:var(--text-dark);
}

.card-subtitle{
    font-size:14px;
    color:var(--text-mid);
    margin-top:5px;
    line-height:1.5;
}

.divider{
    height:1px;
    background:var(--divider);
    margin-bottom:25px;
}

.data-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.data-row:last-child{
    margin-bottom:0;
}

.data-label{
    font-size:16px;
    font-weight:700;
    color:var(--text-dark);
}

.data-badge{
    background:var(--badge-bg);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:999px;
    padding:10px 24px;
    font-size:14px;
    font-weight:600;
    color:var(--badge-text);
    backdrop-filter:blur(6px);
    min-width:180px;
    text-align:center;
}

/* Responsive */
@media(max-width:768px){

    .top-header{
        padding:0 20px;
        height:80px;
    }

    .logo{
        width:55px;
        height:55px;
    }

    .logo-text h1{
        font-size:20px;
    }

    .card{
        margin:20px;
        padding:25px;
    }

    .data-row{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .data-badge{
        width:100%;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="top-header">
    <div class="logo-container">

        <!-- Ganti dengan logo SCRS milikmu -->
        <img src="Logo .png" alt="Logo" class="logo">

        <div class="logo-text">
            <h1>Smarts Room</h1>
            <p>Campus System</p>
        </div>

    </div>
</header>

<!-- CARD -->
<div class="card">

    <div class="card-header">

        <svg class="header-icon" width="60" height="60"
            viewBox="0 0 56 56" fill="none">

            <circle cx="28"
                    cy="20"
                    r="10"
                    stroke="currentColor"
                    stroke-width="3"/>

            <path d="M10 46c0-9.941 8.059-18 18-18
                     s18 8.059 18 18"
                  stroke="currentColor"
                  stroke-width="3"/>

        </svg>

        <div>
            <div class="card-title">
                Informasi Akun
            </div>

            <div class="card-subtitle">
                Pastikan informasi akun Anda<br>
                selalu terbaru dan aman.
            </div>
        </div>

    </div>

    <div class="divider"></div>

    <div class="data-row">
        <span class="data-label">Username</span>
        <span class="data-badge">salmaikhti</span>
    </div>

    <div class="data-row">
        <span class="data-label">Bergabung sejak</span>
        <span class="data-badge">20 Maret 2024</span>
    </div>

    <div class="data-row">
        <span class="data-label">Terakhir diperbarui</span>
        <span class="data-badge">20 Maret 2024</span>
    </div>

</div>

</body>
</html>
