<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peminjaman Kelas - Smart Room</title>

  <script>
    // Auth guard: cek apakah organisasi sudah login
    if (!localStorage.getItem("loggedInOrganisasiKode")) {
      window.location.href = "loginorganisasi.html";
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #f3f2ee;
      --sidebar-text: #4b5563;
      --sidebar-active: #2a3e59; 
      --text-dark: #1e293b;
      --glass-bg: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { display: flex; min-height: 100vh; background: var(--sidebar-bg); -webkit-font-smoothing: antialiased; }

    /* SIDEBAR */
    .sidebar { width: 260px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 15px rgba(0,0,0,0.05); position: fixed; height: 100vh; }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 0 5px; }
    .sidebar-brand img { width: 45px; }
    .brand-text .title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--text-dark); line-height: 1.1; }
    .brand-text .subtitle { font-size: 0.65rem; font-weight: 700; color: var(--sidebar-text); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

    .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .sidebar-menu li a { display: flex; align-items: center; gap: 15px; padding: 12px 15px; text-decoration: none; color: var(--sidebar-text); font-weight: 600; font-size: 0.95rem; border-radius: 50px; transition: 0.3s; cursor: pointer; }
    .sidebar-menu li.active a { background: var(--sidebar-active); color: #ffffff; box-shadow: 0 4px 10px rgba(42, 62, 89, 0.3); }
    .sidebar-menu li a:hover:not(.active) { background: rgba(0, 0, 0, 0.05); transform: translateX(5px); }
    .logout-item { margin-top: auto; }

    /* KONTEN UTAMA */
    .main-content {
      flex: 1; margin-left: 260px; 
      background: linear-gradient(to bottom, rgba(30, 41, 59, 0.15), rgba(30, 41, 59, 0.25)), url("../bg.biru.jpeg");
      background-size: cover; background-position: center; background-attachment: fixed;
      padding: 40px 60px; display: flex; flex-direction: column; min-height: 100vh;
    }

    .header-section { margin-bottom: 30px; }
    .header-section p { font-size: 1.05rem; font-weight: 600; color: #ffffff; margin-bottom: 5px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    .header-section h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

    /* KARTU RUANGAN */
    .rooms-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 35px; }
    .room-card {
      background: var(--glass-bg); backdrop-filter: blur(15px); border: 2px solid var(--glass-border);
      border-radius: 16px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s; color: white;
    }
    .room-card:hover { background: rgba(255,255,255,0.35); transform: translateY(-4px); }
    .room-card.selected { background: rgba(255, 255, 255, 0.45); border-color: #ffffff; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
    .room-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 6px; }
    .room-card p { font-size: 0.75rem; font-weight: 600; margin-bottom: 12px; opacity: 0.8; }
    .status-badge { background: #22c55e; padding: 4px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; display: inline-block; }
    .status-badge.penuh { background: #ef4444; }

    /* FORM GRID */
    .form-wrapper { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1.2fr; gap: 15px; margin-bottom: 25px; }
    .input-group label { display: block; font-size: 0.9rem; font-weight: 800; color: #ffffff; margin-bottom: 10px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    .input-glass { width: 100%; padding: 14px; background: rgba(255,255,255,0.25); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; font-size: 0.9rem; font-weight: 700; outline: none; }
    
    .input-glass option { color: var(--text-dark); background: #ffffff; }
    
    .upload-group { grid-column: 5; grid-row: 1 / span 2; display: flex; flex-direction: column; }
    .upload-box { flex: 1; border: 2px dashed rgba(255,255,255,0.5); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.1); }
    .upload-box:hover { background: rgba(255,255,255,0.2); }
    
    .time-slots-group { grid-column: 1 / span 4; }
    .slots-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .slot-btn { padding: 15px 10px; flex: 1; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; background: rgba(255,255,255,0.1); color: #fff; font-weight: 800; cursor: pointer; }
    .slot-btn.selected { background: #1b9e4d; border-color: #fff; }

    .btn-submit { width: 100%; background: var(--text-dark); color: #ffffff; padding: 18px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
    
    .btn-add-prop { background: var(--text-dark); color: white; border: none; border-radius: 10px; width: 50px; font-size: 1rem; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
    .btn-add-prop:hover { transform: scale(1.05); }
    .list-properti-item { background: rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; color: #fff; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-weight: 600;}

    /* MODAL LOGOUT */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); z-index: 9999; display: none; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
    .modal-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); border: 2px solid #ef4444; border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(239, 68, 68, 0.3); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .modal-icon { width: 80px; height: 80px; background: #ef4444; color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 20px auto; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5); }
    .modal-title { font-family: 'Playfair Display', serif; color: #ffffff; font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    .modal-text { color: rgba(255, 255, 255, 0.9); font-size: 0.95rem; margin-bottom: 30px; }
    .modal-actions { display: flex; gap: 15px; }
    .btn-cancel { flex: 1; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.5); color: #ffffff; border-radius: 50px; padding: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-confirm { flex: 1; background: #ef4444; border: 2px solid #ef4444; color: #ffffff; border-radius: 50px; padding: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    @media (max-width: 900px) {
      .sidebar { width: 100%; height: auto; position: static; }
      .main-content { margin-left: 0; padding: 20px; }
      .form-wrapper { grid-template-columns: 1fr; }
      .upload-group { grid-column: auto; min-height: 120px; }
      .time-slots-group { grid-column: auto; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
        <img src="../Logo.png" alt="Logo">
        <div class="brand-text">
            <div class="title">Smart Room</div>
            <div class="subtitle">Campus System</div>
        </div>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboardorganisasi.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
      <li><a href="dashboardjadwalorganisasi.html"><i class="fa-solid fa-calendar-days"></i> Jadwal</a></li>
      <li><a href="pengaturanorganisasi.html"><i class="fa-solid fa-gear"></i> Pengaturan</a></li>
      <li class="active"><a href="peminjamanorganisasi.html"><i class="fa-solid fa-thumbtack"></i> Peminjaman Kelas</a></li>
      <li class="logout-item"><a onclick="showLogoutModal()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header-section">
      <p>Reservasi Fasilitas</p>
      <h1>Peminjaman Kelas</h1>
    </div>

    <div class="rooms-container" id="roomsContainer">
      <p style="color:white;">Memuat data ruangan...</p>
    </div>

    <form id="formPeminjaman">
      <div class="form-wrapper">
        <div class="input-group"><label>Tanggal</label><input type="date" id="tanggalPinjam" class="input-glass" required></div>
        <div class="input-group"><label>Keperluan</label><input type="text" id="keperluan" class="input-glass" required></div>
        
        <div class="input-group">
            <label>Properti</label>
            <select id="selectProperti" class="input-glass">
                <option value="">Tidak ada</option>
            </select>
            <div id="keranjangContainer"></div>
        </div>
        
        <div class="input-group">
            <label>Jumlah</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="jumlahBarang" class="input-glass" min="1" value="1">
                <button type="button" class="btn-add-prop" onclick="tambahProperti()" title="Tambah Properti"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
        
        <div class="input-group upload-group">
            <label>Berkas</label>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span id="fileName">Upload File</span>
                <input type="file" id="fileInput" style="display:none;" onchange="document.getElementById('fileName').innerText = this.files[0].name">
            </div>
        </div>

        <div class="input-group time-slots-group">
          <label>Slot Waktu</label>
          <div class="slots-container" id="slotsContainer">
            <button type="button" class="slot-btn" onclick="this.classList.toggle('selected')">07.00-08.45</button>
            <button type="button" class="slot-btn" onclick="this.classList.toggle('selected')">08.45-10.25</button>
            <button type="button" class="slot-btn" onclick="this.classList.toggle('selected')">10.25-12.00</button>
            <button type="button" class="slot-btn" onclick="this.classList.toggle('selected')">13.00-14.40</button>
            <button type="button" class="slot-btn" onclick="this.classList.toggle('selected')">14.40-16.20</button>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btnSubmit">SUBMIT PEMINJAMAN</button>
    </form>
  </main>

  <!-- MODAL LOGOUT -->
  <div id="logoutModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
      <h2 class="modal-title">Konfirmasi Keluar</h2>
      <p class="modal-text">Yakin ingin keluar?</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="hideLogoutModal()">Batal</button>
        <button class="btn-confirm" onclick="prosesLogout()">Ya, Logout</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    function showLogoutModal() { document.getElementById('logoutModal').style.display = 'flex'; }
    function hideLogoutModal() { document.getElementById('logoutModal').style.display = 'none'; }
    function prosesLogout() { localStorage.removeItem("loggedInOrganisasiKode"); localStorage.removeItem("loggedInOrganisasiNama"); window.location.href = "../index.html"; }

    const firebaseConfig = {
      apiKey: "AIzaSyAYl1n0CVXiIAMaf_bXca8GuwMcwI4vNR8",
      authDomain: "smartroomcampussystem-a9487.firebaseapp.com",
      projectId: "smartroomcampussystem-a9487",
      storageBucket: "smartroomcampussystem-a9487.firebasestorage.app",
      messagingSenderId: "677979528686",
      appId: "1:677979528686:web:d21d66d3fc724b026042ff",
      measurementId: "G-Q7Z2K2E5T2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let selectedRoom = null;
    let daftarPropertiGlobal = {};
    let keranjangProperti = [];
    let jadwalTerbooking = [];

    // Load data booking yang sudah disetujui
    db.collection("Peminjaman").where("status", "==", "Diterima").onSnapshot(snap => {
        jadwalTerbooking = [];
        snap.forEach(d => jadwalTerbooking.push(d.data()));
        renderRuangan();
    });

    // FUNGSI UTAMA UNTUK RENDER RUANGAN
    function renderRuangan() {
        const tglDipilih = document.getElementById('tanggalPinjam').value;
        const slotsDipilih = [...document.querySelectorAll('.slot-btn.selected')].map(b => b.innerText);

        db.collection("Kelas").get().then(snapshot => {
            let html = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                
                const isTerkunci = jadwalTerbooking.some(booking => 
                    booking.idKelas === doc.id && 
                    booking.tanggalPinjam === tglDipilih && 
                    booking.jam.some(j => slotsDipilih.includes(j))
                );

                const isPenuh = data.status === "Penuh" || isTerkunci;

                html += `<div class="room-card ${isPenuh ? 'penuh' : ''}" 
                            ${isPenuh ? '' : `onclick="selectRoom(this, '${doc.id}')"`}
                            style="${isPenuh ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                            <h3>${data.namaKelas}</h3>
                            <p>Kapasitas: ${data.kapasitas} Org</p>
                            <span class="status-badge ${isPenuh ? 'penuh' : ''}">${isPenuh ? 'Penuh/Terkunci' : 'Tersedia'}</span>
                         </div>`;
            });
            document.getElementById('roomsContainer').innerHTML = html;
        });
    }

    // Load data properti
    db.collection("Properti").onSnapshot(snapshot => {
        let options = '<option value="">Pilih Properti...</option>';
        daftarPropertiGlobal = {};
        snapshot.forEach(doc => {
            const data = doc.data();
            daftarPropertiGlobal[doc.id] = data;
            options += `<option value="${doc.id}" data-nama="${data.namaProperti}">${data.namaProperti} (Sisa: ${data.jumlahTersedia})</option>`;
        });
        document.getElementById('selectProperti').innerHTML = options;
    });

    function selectRoom(el, id) {
        document.querySelectorAll('.room-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedRoom = id;
    }

    // FUNGSI UNTUK MENAMBAH PROPERTI KE KERANJANG
    function tambahProperti() {
        const select = document.getElementById('selectProperti');
        const idProp = select.value;
        const qty = parseInt(document.getElementById('jumlahBarang').value);

        if (!idProp) return alert("Pilih properti terlebih dahulu!");
        if (qty < 1 || isNaN(qty)) return alert("Jumlah minimal 1!");

        const propData = daftarPropertiGlobal[idProp];
        if (qty > propData.jumlahTersedia) return alert(`Stok ${propData.namaProperti} tidak cukup! (Sisa: ${propData.jumlahTersedia})`);

        const index = keranjangProperti.findIndex(p => p.id === idProp);
        if (index > -1) {
            const totalBaru = keranjangProperti[index].jumlah + qty;
            if (totalBaru > propData.jumlahTersedia) return alert("Total jumlah yang Anda minta melebihi stok yang tersedia!");
            keranjangProperti[index].jumlah = totalBaru;
        } else {
            const namaProp = select.options[select.selectedIndex].getAttribute('data-nama');
            keranjangProperti.push({ id: idProp, nama: namaProp, jumlah: qty });
        }

        select.value = "";
        document.getElementById('jumlahBarang').value = 1;
        renderKeranjang();
    }

    function hapusProperti(idProp) {
        keranjangProperti = keranjangProperti.filter(p => p.id !== idProp);
        renderKeranjang();
    }

    function renderKeranjang() {
        const container = document.getElementById('keranjangContainer');
        container.innerHTML = "";
        keranjangProperti.forEach(p => {
            container.innerHTML += `
            <div class="list-properti-item">
                <span>${p.nama} (${p.jumlah})</span>
                <i class="fa-solid fa-xmark" style="cursor:pointer; color:#ef4444;" onclick="hapusProperti('${p.id}')"></i>
            </div>`;
        });
    }

    document.getElementById('formPeminjaman').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!selectedRoom) return alert("Pilih ruangan kelas terlebih dahulu!");

        const selectedSlots = [...document.querySelectorAll('.slot-btn.selected')].map(b => b.innerText);
        if (selectedSlots.length === 0) return alert("Pilih minimal 1 slot waktu!");

        const currentPropID = document.getElementById('selectProperti').value;
        if (currentPropID) {
            tambahProperti();
        }

        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Memproses Peminjaman...";
        btn.disabled = true;

        try {
            for (const item of keranjangProperti) {
                await db.collection("Properti").doc(item.id).update({
                    jumlahTersedia: firebase.firestore.FieldValue.increment(-item.jumlah),
                    jumlahDipinjam: firebase.firestore.FieldValue.increment(item.jumlah)
                });
            }

            let stringProperti = "Tidak ada";
            let totalJumlahKeseluruhan = 0;
            if (keranjangProperti.length > 0) {
                stringProperti = keranjangProperti.map(p => `${p.nama} (${p.jumlah})`).join(", ");
                totalJumlahKeseluruhan = keranjangProperti.reduce((sum, p) => sum + p.jumlah, 0);
            }

            await db.collection("Peminjaman").add({
                idKelas: selectedRoom,
                namaPemohon: localStorage.getItem("loggedInOrganisasiNama") || "Organisasi",
                tanggalPinjam: document.getElementById('tanggalPinjam').value,
                keperluan: document.getElementById('keperluan').value,
                properti: stringProperti,
                jumlahProperti: totalJumlahKeseluruhan,
                jam: selectedSlots,
                status: "Menunggu",
                dibuatPada: firebase.firestore.FieldValue.serverTimestamp()
            });

            window.location.href = "../sukses_peminjaman.html";

        } catch (error) {
            console.error("Error peminjaman: ", error);
            window.location.href = "../gagal_peminjaman.html";
            
            btn.innerText = "SUBMIT PEMINJAMAN";
            btn.disabled = false;
        }
    });

    document.getElementById('tanggalPinjam').addEventListener('change', renderRuangan);
    document.querySelectorAll('.slot-btn').forEach(btn => {
        btn.addEventListener('click', renderRuangan);
    });

    renderRuangan();
  </script>
</body>
</html>
