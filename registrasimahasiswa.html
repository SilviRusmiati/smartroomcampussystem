<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrasi Mahasiswa - Smart Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* =========================================
       CSS VARIABLES (KONSISTEN DENGAN INDEX)
       ========================================= */
    :root {
      --bg-light: #f0f0f0; 
      --text-main: #1e293b; 
      --text-muted: #64748b;
      --accent: #2a3e59; 
      --logo-size: 50px; 
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body { 
      background: var(--bg-light); 
      -webkit-font-smoothing: antialiased; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* =========================================
       NAVBAR / HEADER
       ========================================= */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 60px; background: var(--bg-light); 
      border-bottom: 3px solid var(--accent); 
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      position: sticky; top: 0; z-index: 100;
    }
    
    .brand { display: flex; align-items: center; gap: 15px; text-decoration: none; }
    .logo-icon img { width: var(--logo-size); height: auto; object-fit: contain; }
    
    .brand-text { display: flex; flex-direction: column; justify-content: center; }
    .brand-text .title { 
      font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; 
      color: var(--accent); line-height: 1; margin-bottom: 3px;
    }
    .brand-text .subtitle { 
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase; 
      letter-spacing: 2px; color: var(--text-muted); 
    }

    .btn-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9rem; font-weight: 700; color: var(--accent); 
      text-decoration: none; background: rgba(42, 62, 89, 0.08); 
      padding: 10px 20px; border-radius: 50px; transition: 0.3s;
    }
    .btn-back:hover { background: var(--accent); color: #ffffff; }

    /* =========================================
       AREA REGISTRASI UTAMA
       ========================================= */
    .register-section {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(to bottom, rgba(30, 41, 59, 0.1), rgba(30, 41, 59, 0.2)), url("bg.biru.jpeg");
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }

    /* Kotak Glassmorphism */
    .register-card {
      background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border); border-radius: 24px;
      padding: 40px 45px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .form-title { text-align: center; margin-bottom: 30px; }
    .form-title h2 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #ffffff; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .form-title p { color: rgba(255, 255, 255, 0.9); font-size: 0.95rem; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    /* =========================================
       FORM INPUTS 
       ========================================= */
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { 
      display: block; font-size: 0.9rem; font-weight: 700; color: #ffffff; 
      margin-bottom: 8px; letter-spacing: 0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    
    .input-glass {
      width: 100%; padding: 14px 18px;
      background: rgba(255, 255, 255, 0.35); 
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 12px;
      color: var(--text-main); 
      font-size: 0.95rem; font-weight: 700; outline: none; transition: all 0.3s ease;
      appearance: none; -webkit-appearance: none;
    }
    
    .input-glass::placeholder { color: rgba(30, 41, 59, 0.65); font-weight: 600; }
    .input-glass:focus { 
      background: rgba(255, 255, 255, 0.6); 
      border-color: var(--text-main); 
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.15); 
    }
    
    .input-glass option { background: var(--bg-light); color: var(--text-main); }
    
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '\f0d7'; /* Ikon dropdown FontAwesome */
      font-family: "Font Awesome 6 Free"; font-weight: 900;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%); 
      color: var(--text-main); pointer-events: none;
    }
    
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 45px; }
    .toggle-password {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-main); font-size: 1.1rem; transition: 0.2s;
    }
    .toggle-password:hover { color: var(--accent); }

    hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.4); margin: 15px 0 25px; }
    .section-label {
      font-size: 0.75rem; font-weight: 800; color: #ffffff;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    /* Syarat & Ketentuan */
    .terms-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 25px; }
    .terms-group input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
    .terms-group label { font-size: 0.85rem; color: #ffffff; line-height: 1.5; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.3); cursor: pointer; }
    .terms-group label a { color: #ffffff; font-weight: 800; text-decoration: none; transition: 0.3s; }
    .terms-group label a:hover { color: #93c5fd; text-decoration: underline; }

    /* Tombol Register */
    .btn-register {
      width: 100%; background: var(--accent); color: #ffffff;
      padding: 15px; border: none; border-radius: 12px; letter-spacing: 1px;
      font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }
    .btn-register:hover { background: #1e293b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }

    /* Link Login */
    .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.9); font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .login-link a { color: #ffffff; font-weight: 800; text-decoration: none; transition: 0.3s; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .login-link a:hover { color: #93c5fd; text-decoration: underline; }

    /* Animasi Pop */
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    /* =========================================
       MEDIA QUERIES (RESPONSIF HP)
       ========================================= */
    @media (max-width: 768px) {
      .navbar { padding: 15px 24px; }
      .brand-text .title { font-size: 1.35rem; }
      .brand-text .subtitle { font-size: 0.7rem; }
      .btn-back span { display: none; } 
      .btn-back { padding: 10px 14px; }

      .register-section { padding: 20px 15px; }
      .register-card { padding: 35px 25px; }
      .form-title h2 { font-size: 1.8rem; }
      .input-row { grid-template-columns: 1fr; gap: 0; } 
    }
  </style>
</head>

<body>

  <header class="navbar">
    <a href="index.html" class="brand">
      <div class="logo-icon"><img src="Logo.png" alt="Logo"></div>
      <div class="brand-text">
        <div class="title">Smart Room</div>
        <div class="subtitle">Campus System</div>
      </div>
    </a>
    
    <a href="loginmahasiswa.html" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> <span>Kembali</span>
    </a>
  </header>

  <main class="register-section">
    <div class="register-card">

      <div class="form-title">
        <h2>Registrasi Mahasiswa</h2>
        <p>Lengkapi data diri Anda untuk membuat akun</p>
      </div>

      <form id="formRegistrasi">

        <div class="section-label">Data Pribadi</div>

        <div class="input-row">
          <div class="input-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" name="nim" class="input-glass" placeholder="Contoh: 2024001001" required>
          </div>
          <div class="input-group">
            <label for="angkatan">Angkatan</label>
            <input type="text" id="angkatan" name="angkatan" class="input-glass" placeholder="Contoh: 2024" required>
          </div>
        </div>

        <div class="input-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" name="nama" class="input-glass" placeholder="Nama sesuai KTP" required>
        </div>

        <div class="input-group">
          <label for="email">Email Aktif</label>
          <input type="email" id="email" name="email" class="input-glass" placeholder="nama@email.com" required>
        </div>

        <div class="input-group">
          <label for="no_hp">No. Handphone</label>
          <input type="tel" id="no_hp" name="no_hp" class="input-glass" placeholder="08xxxxxxxxxx" required>
        </div>

        <hr class="divider">

        <div class="section-label">Data Akademik</div>

        <div class="input-group">
          <label for="jurusan">Jurusan / Program Studi</label>
          <div class="select-wrapper">
            <select id="jurusan" name="jurusan" class="input-glass" required>
              <option value="" disabled selected>Pilih Program Studi</option>
              <option value="Teknik Informatika">Teknik Informatika</option>
              <option value="Sistem Informasi">Sistem Informasi</option>
              <option value="Teknik Komputer">Teknik Komputer</option>
              <option value="Manajemen">Manajemen</option>
              <option value="Akuntansi">Akuntansi</option>
              <option value="Hukum">Hukum</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label for="fakultas">Fakultas</label>
          <div class="select-wrapper">
            <select id="fakultas" name="fakultas" class="input-glass" required>
              <option value="" disabled selected>Pilih Fakultas</option>
              <option value="Fak. Teknologi Informasi & Komputer">Fak. Teknologi Informasi & Komputer</option>
              <option value="Fak. Ekonomi & Bisnis">Fak. Ekonomi & Bisnis</option>
              <option value="Fak. Hukum">Fak. Hukum</option>
            </select>
          </div>
        </div>

        <hr class="divider">

        <div class="section-label">Keamanan Akun</div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="input-glass" placeholder="Min. 8 karakter" required>
            <button type="button" class="toggle-password" onclick="togglePass('password', this)" title="Tampilkan password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm_password">Konfirmasi Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" class="input-glass" placeholder="Ulangi password" required>
            <button type="button" class="toggle-password" onclick="togglePass('confirm_password', this)" title="Tampilkan password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="terms-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            Saya menyetujui <a href="#">Syarat & Ketentuan</a> serta
            <a href="#">Kebijakan Privasi</a> Smart Room Campus System.
          </label>
        </div>

        <button type="submit" id="btnRegister" class="btn-register">DAFTAR SEKARANG</button>

        <div class="login-link">
          Sudah punya akun? <a href="loginmahasiswa.html">Login di sini</a>
        </div>

      </form>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // 1. Firebase Configuration (Dari yang kamu berikan)
    const firebaseConfig = {
      apiKey: "AIzaSyAYl1n0CVXiIAMaf_bXca8GuwMcwI4vNR8",
      authDomain: "smartroomcampussystem-a9487.firebaseapp.com",
      projectId: "smartroomcampussystem-a9487",
      storageBucket: "smartroomcampussystem-a9487.firebasestorage.app",
      messagingSenderId: "677979528686",
      appId: "1:677979528686:web:d21d66d3fc724b026042ff",
      measurementId: "G-Q7Z2K2E5T2"
    };

    // 2. Inisialisasi Firebase & Firestore
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Fungsi untuk menampilkan/menyembunyikan password
    function togglePass(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const icon = btn.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // 3. Proses Form dan Simpan ke Firebase
    document.getElementById('formRegistrasi').addEventListener('submit', function(e) {
      e.preventDefault(); // Mencegah pindah halaman sebelum data tersimpan

      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      
      // Validasi Password Cocok
      if (pw !== cpw) {
        alert('Gagal: Password dan Konfirmasi Password tidak cocok!');
        document.getElementById('confirm_password').focus();
        return; 
      }

      // Ubah tombol jadi status loading
      const btn = document.getElementById('btnRegister');
      btn.innerText = "MENYIMPAN DATA...";
      btn.disabled = true;

      // Ambil NIM untuk dijadikan ID Dokumen
      const nim = document.getElementById('nim').value;

      // Perintah menyimpan ke Firestore (Koleksi "Users")
      db.collection("Users").doc(nim).set({
          nim: nim,
          angkatan: document.getElementById('angkatan').value,
          nama: document.getElementById('nama').value,
          email: document.getElementById('email').value,
          no_hp: document.getElementById('no_hp').value,
          jurusan: document.getElementById('jurusan').value,
          fakultas: document.getElementById('fakultas').value,
          password: pw, 
          dibuatPada: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
          alert("Registrasi Berhasil! Silakan Login menggunakan akun yang baru didaftarkan.");
          window.location.href = "loginmahasiswa.html"; // Lempar ke halaman login
      })
      .catch((error) => {
          console.error("Error writing document: ", error);
          alert("Terjadi kesalahan saat registrasi. Pastikan koneksi internet stabil.");
          btn.innerText = "DAFTAR SEKARANG";
          btn.disabled = false;
      });
    });
  </script>

</body>
</html>
