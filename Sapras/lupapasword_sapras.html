<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* ===== BODY ===== */

body {
    min-height: 100vh;
    background: url(bg.biru.jpeg);
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 140px;
    padding-bottom: 60px;
}

/* Layer Blur */
body::before {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.12);
    z-index: -1;
}

/* ===== HEADER ===== */

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 65px;
    background: #f0ece3;
    border-bottom: 3px solid #34507a;
    display: flex;
    align-items: center;
    padding: 14px 28px;
    z-index: 10;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 18px;
}

.logo-area img {
    width: 60px;
}

.logo-text h2 {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #1e3356;
    line-height: 1.2;
}

.logo-text p {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #4a6080;
    text-transform: uppercase;
}

/* ===== CARD ===== */

.container {
    width: 90%;
    max-width: 850px;

    display: flex;
    overflow: hidden;

    border-radius: 30px;

    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,.3);

    backdrop-filter: blur(20px);

    box-shadow: 0 20px 40px rgba(0,0,0,.2);
}

.left,
.right {
    width: 50%;
    padding: 40px;
}

/* ===== KIRI ===== */

.left {
    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    text-align: center;

    color: white;
}

.left img {
    width: 150px;
    margin-bottom: 25px;
}

.left h2 {
    font-size: 28px;
    margin-bottom: 15px;
}

.left p {
    font-size: 16px;
    line-height: 1.8;
    max-width: 300px;
}

/* ===== KANAN ===== */

.right {
    background: rgba(255,255,255,.05);
}

.icon-box {
    width: 80px;
    height: 80px;

    border-radius: 50%;

    background: rgba(255,255,255,.3);

    display: flex;
    justify-content: center;
    align-items: center;

    margin: 0 auto 20px;

    font-size: 35px;
}

.right h1 {
    text-align: center;
    color: white;
    font-size: 32px;
}

.subtitle {
    text-align: center;
    color: rgba(255,255,255,.85);

    margin: 15px 0 30px;

    line-height: 1.6;
    font-size: 15px;
}

/* ===== INPUT ===== */

.input-group {
    margin-bottom: 18px;
}

.input-group label {
    display: block;

    color: white;

    margin-bottom: 8px;

    font-weight: 600;
}

.input-group input {
    width: 100%;

    padding: 15px 18px;

    border: none;
    outline: none;

    border-radius: 12px;

    background: rgba(255,255,255,.9);

    font-size: 15px;
}

/* ===== BUTTON ===== */

button {
    width: 100%;

    padding: 16px;

    border: none;
    border-radius: 12px;

    background: #1F2F56;

    color: white;

    font-size: 16px;
    font-weight: 600;

    cursor: pointer;

    margin-top: 10px;

    transition: .3s;
}

button:hover {
    background: #16203A;
    transform: translateY(-3px);
}

/* ===== LINK ===== */

.back {
    display: block;

    text-align: center;

    margin-top: 20px;

    color: white;

    text-decoration: none;
}

.back:hover {
    text-decoration: underline;
}

/* ===== RESPONSIVE ===== */

@media(max-width:850px) {

    header {
        padding: 0 25px;
    }

    .container {
        flex-direction: column;
    }

    .left,
    .right {
        width: 100%;
        padding: 35px;
    }

    .logo-text h2 {
        font-size: 22px;
    }

    .right h1 {
        font-size: 28px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo-area">
        <img src="Logo .png" alt="Logo">

        <div class="logo-text">
            <h2>Smarts Room</h2>
            <p>CAMPUS SYSTEM</p>
        </div>
    </div>

</header>

<!-- CARD -->

<div class="container">

    <!-- KIRI -->

    <div class="left">

        <img src="https://cdn-icons-png.flaticon.com/512/6195/6195700.png" alt="Lock">

        <h2>Keamanan Akun Anda</h2>

        <p>
            Kami akan membantu Anda mereset password dengan aman melalui email yang terdaftar.
        </p>

    </div>

    <!-- KANAN -->

    <div class="right">

        <div class="icon-box">
            🔒
        </div>

        <h1>Lupa Password?</h1>

        <p class="subtitle">
            Masukkan email Anda dan kami akan mengirimkan link untuk mengatur ulang password.
        </p>

        <form>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Masukkan email Anda">
            </div>

            <button type="submit">
                Kirim Link Reset Password
            </button>

        </form>

        <a href="#" class="back">
            ← Kembali ke Halaman Login
        </a>

    </div>

</div>

</body>
</html>
